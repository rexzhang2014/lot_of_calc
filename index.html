<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A loan calculator that runs on GitHub Pages." />
    <title>Loan Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="top-bar">
          <span id="badge" class="badge">GitHub Pages</span>
          <div class="language-switcher">
            <label for="language" id="language-label">Language</label>
            <select id="language" name="language">
              <option value="en">English</option>
              <option value="zh">中文</option>
            </select>
          </div>
        </div>

        <h1 id="page-title">Loan Calculator</h1>
        <p id="page-intro">Enter your loan details and calculate the repayment schedule directly in your browser.</p>

        <form id="loan-form" class="loan-form">
          <label id="principal-label" for="principal">
            Principal
          </label>
          <input id="principal" type="number" name="principal" value="650000" min="0" step="1000" required />

          <label id="annual-rate-label" for="annualRate">
            Annual rate (%)
          </label>
          <input id="annualRate" type="number" name="annualRate" value="3.91" min="0" step="0.01" required />

          <label id="total-months-label" for="totalMonths">
            Total months
          </label>
          <input id="totalMonths" type="number" name="totalMonths" value="324" min="1" step="1" required />

          <label id="method-label" for="method">
            Repayment method
          </label>
          <select id="method" name="method">
            <option value="equal-interest">Equal principal and interest</option>
            <option value="equal-principal">Equal principal</option>
          </select>

          <div class="form-actions">
            <button id="calculate-button" type="submit">Calculate</button>
            <button id="reset-button" type="button">Reset</button>
          </div>
        </form>

        <section class="prepayment-panel">
          <h2 id="prepayment-title">One-time repayment</h2>
          <p id="prepayment-intro">Choose a repayment month and the amount to apply a one-time repayment.</p>

          <form id="prepayment-form" class="loan-form prepayment-form">
            <label id="prepayment-period-label" for="prepayment-period">Repayment month</label>
            <input id="prepayment-period" type="number" name="prepaymentPeriod" min="1" step="1" required />

            <label id="prepayment-amount-label" for="prepayment-amount">Repayment amount</label>
            <input id="prepayment-amount" type="number" name="prepaymentAmount" min="1" step="100" required />

            <label id="prepayment-strategy-label" for="prepayment-strategy">Strategy</label>
            <select id="prepayment-strategy" name="prepaymentStrategy">
              <option value="shorten-term">Shorten term</option>
              <option value="reduce-payment">Reduce payment</option>
            </select>

            <div class="form-actions">
              <button id="prepayment-button" type="submit">Confirm repayment</button>
            </div>
            <p id="prepayment-message" class="form-message" aria-live="polite"></p>
          </form>
        </section>

        <div id="summary" class="summary"></div>
        <div id="result" class="result"></div>
      </section>
    </main>

    <script src="calculator-core.js"></script>
    <script src="calculator-prepayment.js"></script>
    <script src="i18n.js"></script>
    <script src="calculator-ui.js"></script>
  </body>
</html>
