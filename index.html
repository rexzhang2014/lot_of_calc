<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple runnable website for GitHub Pages." />
    <title>Lot of Calc</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section class="hero">
        <span class="badge">GitHub Pages Ready</span>
        <h1>Welcome to your site</h1>
        <p>This is a simple, runnable website that serves correctly from the repository homepage.</p>
        <div class="cta-row">
          <a class="cta primary" href="https://github.com/rexzhang2014/lot_of_calc" target="_blank" rel="noreferrer">View Repository</a>
          <a class="cta secondary" href="https://pages.github.com/" target="_blank" rel="noreferrer">Learn More</a>
        </div>

        <div class="features">
          <article class="card">
            <h2>Static Site</h2>
            <p>No build step required.</p>
          </article>
          <article class="card">
            <h2>Fast</h2>
            <p>Lightweight HTML, CSS, and JavaScript.</p>
          </article>
          <article class="card">
            <h2>Deployable</h2>
            <p>Works directly from GitHub Pages.</p>
          </article>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
