<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        color: #1f2937;

      .card {
        text-align: center;

      }

  <body>
    <div class="card">
      <h1>Hello, world!</h1>
      <p>This is a minimal page ready for GitHub Pages.</p>
    </div>
